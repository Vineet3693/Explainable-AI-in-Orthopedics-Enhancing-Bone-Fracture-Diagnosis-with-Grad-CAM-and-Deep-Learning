[pytest]
# Configuration for pytest

# Search for tests in these directories
testpaths = tests

# Test file pattern
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# CLI options
# -v: verbose
# -rsxX: show extra test summary info
# --strict-markers: invalid markers raise errors
addopts = -v -rsxX --strict-markers --cov=src --cov-report=term-missing

# Environment variables
env =
    APP_ENV=test
    GEMINI_API_KEY=test_key
    GROQ_API_KEY=test_key

# Markers
markers =
    slow: mark test as slow (exclude with '-m "not slow"')
    integration: mark test as integration test
    api: mark test as api test
