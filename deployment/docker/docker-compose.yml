version: '3.8'

services:
  # FastAPI Backend
  api:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    container_name: fracture-detection-api
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - WANDB_API_KEY=${WANDB_API_KEY}
    volumes:
      - ../../models:/app/models
      - ../../logs:/app/logs
      - ../../results:/app/results
    networks:
      - fracture-net
    restart: unless-stopped

  # Streamlit Frontend
  frontend:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    container_name: fracture-detection-frontend
    command: streamlit run deployment/frontend/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - fracture-net
    restart: unless-stopped

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: fracture-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - fracture-net
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: fracture-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ../../dashboards/grafana:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - fracture-net
    restart: unless-stopped

networks:
  fracture-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
