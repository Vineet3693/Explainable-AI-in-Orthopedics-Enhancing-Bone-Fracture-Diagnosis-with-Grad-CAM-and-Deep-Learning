global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Fracture Detection API
  - job_name: "fracture-detection-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: "/metrics"

  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
