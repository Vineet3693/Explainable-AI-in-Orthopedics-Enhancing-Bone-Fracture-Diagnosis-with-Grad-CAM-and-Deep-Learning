# ResNet50 Configuration

## Model Settings
model:
  name: resnet50
  input_size: 224
  dropout: 0.5
  l2_regularization: 0.01

## Training Settings
training:
  # Total epochs: 50 (25 + 25)
  total_epochs: 50

  # Phase 1: Frozen base
  phase1:
    epochs: 25
    learning_rate: 0.001
    batch_size: 32
    freeze_base: true

  # Phase 2: Fine-tuning
  phase2:
    epochs: 25
    learning_rate: 0.0001 # 10x lower
    batch_size: 32
    unfreeze_layers: 50

## Data Balancing
balancing:
  focal_loss:
    alpha: 0.75
    gamma: 2.0
  class_weights:
    auto_calculate: true

## Expected Performance
performance:
  accuracy: 0.942
  recall: 0.951
  auc: 0.967
  training_time_gpu: "1.5 hours"
  training_time_cpu: "6 hours"
